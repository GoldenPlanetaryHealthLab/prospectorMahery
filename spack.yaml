# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  # add package specs to the `specs` list
  specs:
  - cmake
  - libuv
  - gmake
  - git
  - libx11
  - libxml2
  - curl
  - openssl
  - freetype
  - libjpeg
  - libjpeg-turbo
  - libpng
  - libtiff
  - icu4c
  - fontconfig
  - fribidi
  - harfbuzz
  - libgit2
  - r@4.5.1
  - cairo
  - r-cairo
  - neovim
  view: true
  concretizer:
    unify: true
