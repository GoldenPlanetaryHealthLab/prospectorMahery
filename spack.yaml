# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  # add package specs to the `specs` list
  specs:
  - cmake
  - libuv
  - gmake
  - git
  - libx11
  - libxml2
  - curl
  - openssl
  - freetype
  - libjpeg
  - libjpeg-turbo
  - libpng
  - libtiff
  - icu4c
  - fontconfig
  - fribidi
  - harfbuzz
  - libgit2
  - r@4.5.1
  - cairo
  - r-cairo
  - glibc
  # editor
  - neovim
  - tmux
  - ripgrep
  - fd
  - fzf
  - tree-sitter
  - git

  # scientific stack
  - r@4.5.1
  - pandoc

  # r packages
  - r-devtools
  - r-rmarkdown
  - r-usethis
  - r-dplyr
  - r-readxl
  
  # pins
  - gettext@0.22.5
  view: .spack-env/view
  concretizer:
    unify: true
  packages:
    gettext:
      require: 
        - "%gcc@8.5.0"
        - "@0.22.5"
